<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jefferson</title>
    <style>
        /* Configuración general para centrar todo en la pantalla */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Caja contenedora del título */
        .contenedor {
            text-align: center;
            background-color: #ffffff;
            padding: 40px 60px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* Estilo del título */
        h1 {
            color: #2c3e50;
            font-size: 3rem;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        /* Estilo del texto secundario */
        p {
            color: #7f8c8d;
            margin: 0;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Jefferson</h1>
        <p>Bienvenido a mi sitio web básico.</p>
    </div>

</body>
</html>
